<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mess Mate Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #4361ee;
            --success: #00f5d4;
            --danger: #f72585;
            --warning: #fee440;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(at 0% 0%, rgba(67, 97, 238, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(247, 37, 133, 0.1) 0px, transparent 50%);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .tv-container {
            width: 95%; max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-top: 20px; border-radius: 16px; overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .video-frame {
            position: relative; padding-top: 56.25%; background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        #video-player, #youtube-iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; border: none;
        }

        /* অটো-হাইড নেভিগেশন বাটন */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(67, 97, 238, 0.7);
            color: white; border: none; padding: 20px 15px;
            cursor: pointer; font-size: 24px; z-index: 10;
            transition: all 0.3s ease;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
        }

        .nav-btn:hover {
            background: var(--primary);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.6);
        }

        /* ভিডিও ফ্রেমে হোভার করলে বা টাচ করলে বাটন দেখাবে */
        .video-frame:hover .nav-btn,
        .video-frame.show-controls .nav-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        .channel-info {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), #3a0ca3);
            color: white; text-align: center;
            border-radius: 16px 16px 0 0;
            position: relative;
            overflow: hidden;
        }

        .channel-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .channel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px; padding: 15px;
            max-height: 250px; overflow-y: auto;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 0 0 16px 16px;
        }

        .channel-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 12px 8px;
            text-align: center; cursor: pointer;
            font-weight: 600; font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
            color: var(--text-light);
            position: relative;
            overflow: hidden;
        }

        .channel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(67, 97, 238, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .channel-card:hover {
            background: rgba(67, 97, 238, 0.3);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
        }

        .channel-card:hover::before {
            left: 100%;
        }

        .active-channel {
            background: linear-gradient(135deg, var(--primary), #3a0ca3) !important;
            color: white !important;
            border-color: var(--primary) !important;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.5) !important;
            transform: scale(1.05);
        }

        .hidden { display: none; }

        /* Channel button click animation */
        @keyframes channelPulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .channel-card:active {
            animation: channelPulse 0.2s ease;
        }

        /* Scrollbar styling */
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }

        .channel-list::-webkit-scrollbar-track {
            background: rgba(67, 97, 238, 0.1);
            border-radius: 3px;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .channel-list { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
            .nav-btn { padding: 15px 10px; font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="tv-container">
    <div class="channel-info">
        <a href="dashboard.html" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); text-decoration: none;"><button style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 18px;">←</button></a>
        <h3 id="now-playing">চ্যানেল লিস্ট লোড হচ্ছে...</h3>
    </div>

    <div class="video-frame" id="v-frame" onclick="toggleControls()">
        <button class="nav-btn prev-btn" onclick="event.stopPropagation(); changeChannel(-1)">❮</button>
        <video id="video-player" controls autoplay poster="https://via.placeholder.com/800x450?text=Mess+Mate+TV"></video>
        <iframe id="youtube-iframe" class="hidden" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <button class="nav-btn next-btn" onclick="event.stopPropagation(); changeChannel(1)">❯</button>
    </div>

    <div class="channel-list" id="channel-grid"></div>
</div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThlDsQpH1YY8qZECxPRMMD4SvsBuySA4O3bq3WpZsACW0uHavokfLQdCYgmiPeLhZTIXN_YWMxhSyP/pub?gid=0&single=true&output=csv"; 

    const video = document.getElementById('video-player');
    const ytIframe = document.getElementById('youtube-iframe');
    const channelGrid = document.getElementById('channel-grid');
    const statusText = document.getElementById('now-playing');
    const vFrame = document.getElementById('v-frame');
    
    let allChannels = [];
    let currentIndex = -1;
    let controlTimer;

    // টাচ বা ক্লিকের পর বাটন দেখানোর ফাংশন
    function toggleControls() {
        vFrame.classList.add('show-controls');
        clearTimeout(controlTimer);
        controlTimer = setTimeout(() => {
            vFrame.classList.remove('show-controls');
        }, 3000); // ৩ সেকেন্ড পর অটোমেটিক বাটন চলে যাবে
    }

    async function loadChannels() {
        try {
            const response = await fetch(SHEET_CSV_URL + "&v=" + Date.now());
            const data = await response.text();
            const rows = data.split('\n');
            
            channelGrid.innerHTML = '';
            allChannels = [];
            
            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i].split(',');
                if (columns.length >= 2) {
                    const name = columns[0].replace(/"/g, "").trim();
                    const url = columns[1].replace(/"/g, "").trim();
                    
                    if (name && url && name.toLowerCase() !== 'name' && url.toLowerCase() !== 'url') {
                        const channelIndex = allChannels.length;
                        allChannels.push({ name, url });
                        
                        const card = document.createElement('div');
                        card.className = 'channel-card';
                        card.innerText = name;
                        card.id = "chan-" + channelIndex;
                        card.onclick = (e) => {
                            e.stopPropagation();
                            playStream(channelIndex);
                        };
                        channelGrid.appendChild(card);
                    }
                }
            }

            if (allChannels.length > 0) {
                statusText.innerText = "একটি চ্যানেল বেছে নিন";
            } else {
                statusText.innerText = "শিটে কোনো চ্যানেল পাওয়া যায়নি!";
            }
        } catch (error) {
            statusText.innerText = "Error: ডাটা লোড ব্যর্থ!";
        }
    }

    function playStream(index) {
        if (index < 0 || index >= allChannels.length) return;
        
        currentIndex = index;
        const selectedChannel = allChannels[index];
        
        // কার্ড সিলেকশন আপডেট
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active-channel'));
        const activeCard = document.getElementById("chan-" + index);
        if (activeCard) {
            activeCard.classList.add('active-channel');
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        statusText.innerText = "এখন দেখছেন: " + selectedChannel.name;

        if (selectedChannel.url.includes('youtube.com') || selectedChannel.url.includes('youtu.be')) {
            let videoId = "";
            if(selectedChannel.url.includes('v=')) videoId = selectedChannel.url.split('v=')[1].split('&')[0];
            else videoId = selectedChannel.url.split('/').pop();
            
            video.classList.add('hidden');
            video.pause();
            ytIframe.classList.remove('hidden');
            ytIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`; 
        } else {
            ytIframe.classList.add('hidden');
            ytIframe.src = "";
            video.classList.remove('hidden');

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(selectedChannel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = selectedChannel.url;
                video.play();
            }
        }
    }

    function changeChannel(step) {
        if (allChannels.length === 0) return;
        let nextIndex = currentIndex + step;
        
        if (nextIndex >= allChannels.length) nextIndex = 0;
        if (nextIndex < 0) nextIndex = allChannels.length - 1;
        
        playStream(nextIndex);
    }

    window.onload = loadChannels;
</script>

</body>
</html>
